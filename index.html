<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner to Firebase</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border: 2px solid #333; border-radius: 10px; overflow: hidden; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 15px; font-weight: bold; color: blue; }
        .data-table { margin: 20px auto; width: 90%; border-collapse: collapse; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .data-table th { background-color: #333; color: white; }
    </style>
</head>
<body>

    <h2>Product Scanner</h2>
    <button id="start-scan">Scan Product</button>
    <div id="reader"></div>
    <div id="status"></div>

    <h3>Recently Saved:</h3>
    <table class="data-table" id="data-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Qty</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD_MJAYCk5JZuOn6_YwsBC86gBKxwC_EKY",
            authDomain: "cosmatic-a7f73.firebaseapp.com",
            databaseURL: "https://cosmatic-a7f73-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cosmatic-a7f73",
            storageBucket: "cosmatic-a7f73.firebasestorage.app",
            messagingSenderId: "693000942896",
            appId: "1:693000942896:web:5208e137c75e62749c44f5",
            measurementId: "G-L7FNN9G0NY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let html5QrCode;

        document.getElementById('start-scan').addEventListener('click', () => {
            html5QrCode = new Html5Qrcode("reader");
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerText = "Camera starting...";

            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // স্ক্যান সাকসেস হলে এখানে আসবে
                    statusDiv.innerText = "Scanned: " + decodedText;
                    processScannedData(decodedText);
                    html5QrCode.stop(); // স্ক্যান হওয়ার পর ক্যামেরা বন্ধ হবে
                },
                (errorMessage) => {
                    // স্ক্যানিং চলাকালীন এরর (ignore)
                }
            ).catch(err => {
                statusDiv.innerText = "Camera Error: " + err;
            });
        });

        async function processScannedData(data) {
            const statusDiv = document.getElementById('status');
            
            // ডাটা ফরম্যাট আশা করছি: Name,Price,Quantity
            // উদাহরণ: Lux,50,2
            const parts = data.split(',');

            if (parts.length >= 3) {
                const name = parts[0].trim();
                const price = parts[1].trim();
                const qty = parts[2].trim();

                try {
                    statusDiv.innerText = "Saving to Firebase...";
                    
                    // Firebase Firestore-এ সেভ করা
                    await addDoc(collection(db, "scanned_products"), {
                        productName: name,
                        price: parseFloat(price),
                        quantity: parseInt(qty),
                        timestamp: serverTimestamp()
                    });

                    statusDiv.style.color = "green";
                    statusDiv.innerText = "Successfully Saved: " + name;

                    // টেবিলে ডাটা দেখানো
                    addToTable(name, price, qty);

                } catch (e) {
                    console.error("Error adding document: ", e);
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Firebase Error!";
                }
            } else {
                statusDiv.style.color = "red";
                statusDiv.innerText = "Invalid QR Format! Use: Name,Price,Qty";
            }
        }

        function addToTable(name, price, qty) {
            const tbody = document.getElementById('table-body');
            const row = `<tr>
                <td>${name}</td>
                <td>${price}</td>
                <td>${qty}</td>
            </tr>`;
            tbody.innerHTML = row + tbody.innerHTML;
        }

    </script>
</body>
</html>
