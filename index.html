<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India OTP Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #eef2f3; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        h2 { color: #333; }
        .input-group { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 5px; margin: 15px 0; padding: 5px; }
        .prefix { padding: 0 10px; font-weight: bold; color: #555; border-right: 1px solid #ccc; }
        input { border: none; outline: none; padding: 10px; width: 100%; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #ff9933; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #138808; } /* ইন্ডিয়া পতাকার রং থিম */
        #otp-section { display: none; margin-top: 15px; }
        .msg { margin-top: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>India Login</h2>
        
        <!-- ফোন নাম্বার সেকশন -->
        <div id="phone-section">
            <p>Enter your 10-digit mobile number</p>
            <div class="input-group">
                <span class="prefix">+91</span>
                <input type="number" id="phone-number" placeholder="9876543210">
            </div>
            <div id="recaptcha-container"></div>
            <button id="send-otp-btn">Send OTP</button>
        </div>

        <!-- OTP ভেরিফাই সেকশন -->
        <div id="otp-section">
            <input type="text" id="otp-input" placeholder="Enter 6-digit OTP">
            <button id="verify-otp-btn" style="background: #138808;">Verify & Login</button>
        </div>

        <p id="message" class="msg"></p>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAFUAATQoR0Kidzm9665tILTMNArFgKO9k",
            authDomain: "school-websit-9c152.firebaseapp.com",
            databaseURL: "https://school-websit-9c152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-websit-9c152",
            storageBucket: "school-websit-9c152.firebasestorage.app",
            messagingSenderId: "591107596339",
            appId: "1:591107596339:web:7ea49a657abd08f1f20346",
            measurementId: "G-K7R4D9Q2L4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const message = document.getElementById("message");

        // reCAPTCHA সেটিংস
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'invisible'
        });

        // OTP পাঠানোর বাটন ক্লিক করলে
        document.getElementById("send-otp-btn").onclick = function() {
            let number = document.getElementById("phone-number").value;
            
            if (number.length !== 10) {
                showMsg("দয়া করে সঠিক ১০ ডিজিট নাম্বার দিন!", "red");
                return;
            }

            // ইন্ডিয়া কান্ট্রি কোড (+91) যোগ করা হচ্ছে
            const fullPhoneNumber = "+91" + number;
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, fullPhoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById("phone-section").style.display = "none";
                    document.getElementById("otp-section").style.display = "block";
                    showMsg("OTP পাঠানো হয়েছে +91 " + number + " নাম্বারে", "green");
                }).catch((error) => {
                    console.error(error);
                    showMsg("ভুল হয়েছে: " + error.message, "red");
                });
        };

        // OTP ভেরিফাই করা
        document.getElementById("verify-otp-btn").onclick = function() {
            const code = document.getElementById("otp-input").value;

            window.confirmationResult.confirm(code).then((result) => {
                showMsg("লগিন সফল হয়েছে!", "green");
                alert("Login Successful! UID: " + result.user.uid);
            }).catch((error) => {
                showMsg("ভুল OTP কোড!", "red");
            });
        };

        function showMsg(text, color) {
            message.innerText = text;
            message.style.color = color;
        }
    </script>
</body>
</html>
