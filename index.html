<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India OTP Login - Firebase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        
        .phone-input-wrapper { display: flex; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        .country-code { background: #eee; padding: 12px; border-right: 1px solid #ccc; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: none; outline: none; font-size: 16px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #send-otp-btn { background: #ff9933; color: white; } /* India Orange */
        #verify-otp-btn { background: #138808; color: white; } /* India Green */
        button:hover { opacity: 0.9; }

        #otp-section { display: none; margin-top: 20px; }
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
        #status-msg { margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>India Phone Login</h2>
        
        <!-- স্টেপ ১: ফোন নাম্বার এন্ট্রি -->
        <div id="phone-section">
            <p style="margin-bottom: 10px; color: #666;">Enter your 10-digit mobile number</p>
            <div class="phone-input-wrapper">
                <span class="country-code">+91</span>
                <input type="number" id="phone-number" placeholder="9876543210">
            </div>
            
            <!-- reCAPTCHA Container -->
            <div id="recaptcha-container"></div>
            
            <button id="send-otp-btn">Send OTP</button>
        </div>

        <!-- স্টেপ ২: OTP ভেরিফিকেশন -->
        <div id="otp-section">
            <p style="margin-bottom: 10px; color: #666;">Enter the 6-digit OTP sent to your phone</p>
            <input type="text" id="otp-input" placeholder="123456" maxlength="6">
            <button id="verify-otp-btn">Verify & Login</button>
        </div>

        <p id="status-msg"></p>
    </div>

    <!-- Firebase SDK (Version 10+) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAFUAATQoR0Kidzm9665tILTMNArFgKO9k",
            authDomain: "school-websit-9c152.firebaseapp.com",
            databaseURL: "https://school-websit-9c152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-websit-9c152",
            storageBucket: "school-websit-9c152.firebasestorage.app",
            messagingSenderId: "591107596339",
            appId: "1:591107596339:web:7ea49a657abd08f1f20346",
            measurementId: "G-K7R4D9Q2L4"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const statusMsg = document.getElementById("status-msg");

        // ১. reCAPTCHA সেটআপ (এটি 'normal' রাখা হয়েছে যাতে আপনি দেখতে পারেন)
        function initRecaptcha() {
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal', // বক্সে টিক দেওয়ার অপশন আসবে
                'callback': (response) => {
                    console.log("reCAPTCHA solved.");
                },
                'expired-callback': () => {
                    alert("reCAPTCHA expired. Please solve it again.");
                }
            });
        }
        initRecaptcha();

        // ২. OTP পাঠানোর ফাংশন
        document.getElementById("send-otp-btn").onclick = function() {
            const phone = document.getElementById("phone-number").value;
            
            if (phone.length !== 10) {
                updateMsg("Please enter a valid 10-digit number!", "red");
                return;
            }

            const fullPhoneNumber = "+91" + phone;
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, fullPhoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById("phone-section").style.display = "none";
                    document.getElementById("otp-section").style.display = "block";
                    updateMsg("OTP sent to +91 " + phone, "green");
                }).catch((error) => {
                    console.error(error);
                    updateMsg("Error: " + error.message, "red");
                    // ভুল হলে ক্যাপচা রিসেট করতে হতে পারে
                    location.reload(); 
                });
        };

        // ৩. OTP ভেরিফাই করার ফাংশন
        document.getElementById("verify-otp-btn").onclick = function() {
            const code = document.getElementById("otp-input").value;

            window.confirmationResult.confirm(code).then((result) => {
                const user = result.user;
                updateMsg("Verification Successful! User ID: " + user.uid, "green");
                alert("Welcome! Login Successful.");
                // সফল হলে এখানে অন্য পেজে রিডাইরেক্ট করতে পারেন
            }).catch((error) => {
                updateMsg("Invalid OTP. Try again.", "red");
            });
        };

        function updateMsg(text, color) {
            statusMsg.innerText = text;
            statusMsg.style.color = color;
        }
    </script>
</body>
</html>
