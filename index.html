<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Scanner</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; border: 3px solid #007bff; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-scan { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; display: none; }
        #loader { display: none; color: #ff5722; font-weight: bold; margin: 10px; }
        .question-list { text-align: left; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
        .q-item { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-left: 5px solid #007bff; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 Question Scanner</h2>
    <p style="font-size: 12px; color: #666;">প্রশ্নপত্রের ছবি তুলুন, এটি অটোমেটিক সিরিয়াল অনুযায়ী সাজাবে।</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <button class="btn btn-scan" id="scan-btn">📷 Capture & Sort Questions</button>
    <div id="loader">Processing Paper... Please Wait...</div>

    <div id="result-area" class="question-list">
        <!-- সাজানো প্রশ্ন এখানে দেখাবে -->
    </div>

    <button class="btn btn-save" id="save-firebase">💾 Save All to Firebase</button>
    <div id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD_MJAYCk5JZuOn6_YwsBC86gBKxwC_EKY",
        authDomain: "cosmatic-a7f73.firebaseapp.com",
        projectId: "cosmatic-a7f73",
        storageBucket: "cosmatic-a7f73.firebasestorage.app",
        messagingSenderId: "693000942896",
        appId: "1:693000942896:web:5208e137c75e62749c44f5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const resultArea = document.getElementById('result-area');
    const saveBtn = document.getElementById('save-firebase');
    let scannedQuestions = [];

    // ক্যামেরা চালু
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera error: " + err));

    // স্ক্যান বাটন ক্লিক
    document.getElementById('scan-btn').addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        document.getElementById('loader').style.display = 'block';
        resultArea.innerHTML = "";

        try {
            // OCR প্রসেসিং
            const result = await Tesseract.recognize(canvas.toDataURL(), 'eng+ben'); // English & Bengali support
            const fullText = result.data.text;
            
            // প্রশ্ন আলাদা করার লজিক (Regex)
            // এটি 1. বা 2) বা Q1: এই ধরণের সিরিয়াল নম্বর খুঁজবে
            const questionPattern = /(\d+[\.\)\:]\s+[^0-9]+)/g;
            const matches = fullText.match(questionPattern);

            if (matches && matches.length > 0) {
                scannedQuestions = matches.map(q => q.trim());
                displayQuestions(scannedQuestions);
                saveBtn.style.display = 'block';
            } else {
                resultArea.innerHTML = "<p style='color:red;'>No serial numbers found. Try to take a clearer picture.</p>";
            }
        } catch (e) {
            console.error(e);
            alert("Error scanning text.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    });

    // স্ক্রিনে প্রশ্নগুলো দেখানো
    function displayQuestions(questions) {
        questions.forEach((q, index) => {
            const div = document.createElement('div');
            div.className = 'q-item';
            div.innerText = q;
            resultArea.appendChild(div);
        });
    }

    // Firebase-এ সেভ করা
    saveBtn.addEventListener('click', async () => {
        if (scannedQuestions.length === 0) return;

        try {
            document.getElementById('status').innerText = "Saving to Firebase...";
            await addDoc(collection(db, "question_papers"), {
                questions: scannedQuestions,
                total: scannedQuestions.length,
                createdAt: serverTimestamp()
            });
            alert("All questions saved successfully!");
            location.reload();
        } catch (e) {
            alert("Firebase Error: " + e.message);
        }
    });
</script>

</body>
</html>
